<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 Highway Racer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Arial Black', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            touch-action: manipulation;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            display: block;
            box-shadow: 0 0 40px rgba(0, 255, 100, 0.6);
            border-radius: 12px;
            max-width: 100%;
            max-height: 100%;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            text-shadow: 2px 2px 6px #000;
            pointer-events: none;
            z-index: 10;
        }
        .mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: none;
            justify-content: space-between;
            z-index: 20;
        }
        .control-btn {
            width: 85px;
            height: 85px;
            background: rgba(0, 255, 136, 0.25);
            border: 4px solid rgba(0, 255, 136, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            backdrop-filter: blur(8px);
        }
        #gameOver {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
            border: 5px solid #00ff88;
            box-shadow: 0 0 40px #00ff88;
        }
        button {
            margin-top: 25px;
            padding: 16px 45px;
            font-size: 26px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        @media (max-width: 900px) {
            #ui { font-size: 20px; }
            .mobile-controls { display: flex; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        
        <div id="ui">
            <div>Skor: <span id="score">0</span></div>
            <div>En Yüksek: <span id="highScore">0</span></div>
        </div>

        <!-- Mobil Kontroller -->
        <div class="mobile-controls">
            <div class="control-btn" id="leftBtn">←</div>
            <div class="control-btn" id="rightBtn">→</div>
        </div>

        <div id="gameOver">
            <h1>🚗 OYUN BİTTİ</h1>
            <p id="finalScore" style="font-size: 32px; margin: 20px 0;">Skor: 0</p>
            <button onclick="restartGame()">🔄 TEKRAR OYNA</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let gameRunning = false;
        let score = 0;
        let highScore = parseFloat(localStorage.getItem('highwayHighScore')) || 0;
        highScoreEl.textContent = Math.floor(highScore);

        let player = { x: 370, y: 460, width: 68, height: 130, speed: 9 };
        let roadY = 0;
        let obstacles = [];
        let particles = [];
        let speed = 7;
        let lastObstacle = 0;
        let keys = {};

        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth * 0.95, 820);
            const maxH = Math.min(window.innerHeight * 0.92, 680);
            canvas.width = maxW;
            canvas.height = maxH;
            player.x = canvas.width / 2 - player.width / 2;
        }

        function drawRoad() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Kenar çimen
            ctx.fillStyle = '#0a3a0a';
            ctx.fillRect(0, 0, 130, canvas.height);
            ctx.fillRect(canvas.width - 130, 0, 130, canvas.height);

            // Bariyer
            ctx.fillStyle = '#444';
            ctx.fillRect(115, 0, 25, canvas.height);
            ctx.fillRect(canvas.width - 140, 0, 25, canvas.height);

            // Yol çizgileri
            ctx.strokeStyle = '#ff0';
            ctx.lineWidth = 11;
            ctx.setLineDash([55, 85]);
            for (let i = -2; i < 12; i++) {
                let y = (roadY + i * 135) % (canvas.height + 400) - 200;
                ctx.beginPath();
                ctx.moveTo(canvas.width * 0.35, y);
                ctx.lineTo(canvas.width * 0.35, y + 100);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(canvas.width * 0.65, y);
                ctx.lineTo(canvas.width * 0.65, y + 100);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        function drawCar(x, y, color = '#00ff88', isPlayer = false) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(x + 8, y + 28, player.width - 16, player.height - 45);

            ctx.fillStyle = color;
            ctx.fillRect(x, y + 12, player.width, player.height - 35);

            ctx.fillStyle = isPlayer ? '#00aaff' : '#cc2222';
            ctx.fillRect(x + 12, y + 38, player.width - 24, 48);

            ctx.fillStyle = '#ffff00';
            ctx.fillRect(x + 8, y + 20, 15, 16);
            ctx.fillRect(x + player.width - 23, y + 20, 15, 16);

            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x + 10, y + player.height - 38, 17, 14);
            ctx.fillRect(x + player.width - 27, y + player.height - 38, 17, 14);

            if (isPlayer) {
                ctx.fillStyle = '#005588';
                ctx.fillRect(x + 10, y + 15, player.width - 20, 10);
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 28; i++) {
                const angle = Math.random() * Math.PI * 2;
                const vel = 3 + Math.random() * 6;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * vel,
                    vy: Math.sin(angle) * vel - 3,
                    life: 38,
                    size: 6 + Math.random() * 8,
                    color: Math.random() > 0.5 ? '#ff8800' : '#ffee44'
                });
            }
        }

        function update() {
            if (!gameRunning) return;

            roadY += speed * 1.9;
            score += 2;
            scoreEl.textContent = Math.floor(score / 4);

            if (score % 550 === 0) speed = Math.min(speed + 0.4, 14);

            // Klavye hareketi
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;

            player.x = Math.max(145, Math.min(canvas.width - player.width - 145, player.x));

            // Engeller
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += speed;

                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y
                ) {
                    createExplosion(player.x + player.width/2, player.y + 60);
                    gameOver();
                    return;
                }

                if (obstacles[i].y > canvas.height + 100) obstacles.splice(i, 1);
            }

            // Engel spawn
            if (Date.now() - lastObstacle > Math.max(650, 1250 - speed * 45)) {
                const lane = Math.floor(Math.random() * 3);
                obstacles.push({
                    x: 165 + lane * (canvas.width - 330) / 2,
                    y: -150,
                    width: 68,
                    height: 130
                });
                lastObstacle = Date.now();
            }

            // Parçacıklar
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.28;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            drawRoad();
            obstacles.forEach(obs => drawCar(obs.x, obs.y, '#ff4444'));
            drawCar(player.x, player.y, '#00ff88', true);

            ctx.globalAlpha = 0.85;
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ====================== KONTROLLER ======================
        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);

        // Mobil Swipe
        let touchStartX = 0;
        canvas.addEventListener('touchstart', e => {
            if (!gameRunning) return;
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', e => {
            if (!gameRunning) return;
            const currentX = e.touches[0].clientX;
            const diff = currentX - touchStartX;
            player.x += diff * 1.4;
            touchStartX = currentX;
        });

        // Mobil Butonlar
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        function moveLeft() { if (gameRunning) player.x -= 18; }
        function moveRight() { if (gameRunning) player.x += 18; }

        leftBtn.addEventListener('touchstart', () => { setInterval(moveLeft, 16); });
        rightBtn.addEventListener('touchstart', () => { setInterval(moveRight, 16); });

        function startGame() {
            gameRunning = true;
            score = 0;
            speed = 7;
            obstacles = [];
            particles = [];
            player.x = canvas.width / 2 - player.width / 2;
            lastObstacle = Date.now();
            scoreEl.textContent = '0';
            gameOverScreen.style.display = 'none';
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highwayHighScore', highScore);
                highScoreEl.textContent = Math.floor(highScore);
            }
            finalScoreEl.textContent = `Skor: ${Math.floor(score / 4)}`;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            startGame();
        }

        // Başlat
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        startGame();
        gameLoop();
    </script>
</body>
</html>
