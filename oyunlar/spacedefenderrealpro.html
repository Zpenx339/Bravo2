<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 SPACE DEFENDER - Poki Kalitesi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(45deg, #0c0c1e, #1a1a3a, #2a2a5a);
            color: white;
            font-family: 'Arial Black', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            border: 4px solid #00ff88;
            border-radius: 15px;
            box-shadow: 0 0 50px #00ff88, inset 0 0 50px rgba(0,255,136,0.1);
            background: radial-gradient(circle at center, #001122 0%, #000011 70%);
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            z-index: 100;
        }
        .lives {
            display: flex;
            gap: 10px;
        }
        .heart { 
            width: 30px; height: 30px; 
            background: #ff4444; 
            clip-path: polygon(50% 0%, 0% 40%, 0% 100%, 50% 80%, 100% 100%, 100% 40%);
            box-shadow: 0 0 15px #ff4444;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .game-over {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff4444;
            display: none;
        }
        .restart-btn {
            background: linear-gradient(45deg, #00ff88, #00cc66);
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,255,136,0.5);
            transition: all 0.3s;
        }
        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0,255,136,0.8);
        }
        #joystick {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 140px;
            height: 140px;
            background: rgba(0,255,136,0.2);
            border: 3px solid rgba(0,255,136,0.5);
            border-radius: 50%;
            display: none;
            z-index: 100;
        }
        #joystick-knob {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(0,255,136,0.8);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(0,255,136,0.6);
            transition: 0.1s;
        }
        @media (max-width: 768px) {
            canvas { width: 95vw; height: 70vh; }
            #joystick { display: block; }
            .ui { font-size: 20px; flex-direction: column; gap: 10px; }
        }
        .level-up {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px #ffd700;
            animation: levelUp 2s ease-out;
            pointer-events: none;
            z-index: 200;
            display: none;
        }
        @keyframes levelUp {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui">
        <div>⭐ Skor: <span id="score">0</span></div>
        <div>⚡ Level: <span id="level">1</span></div>
        <div class="lives" id="lives"></div>
    </div>

    <div class="level-up" id="levelUp">LEVEL UP! 🎉</div>
    
    <div class="game-over" id="gameOver">
        <h1>💥 OYUN BİTTİ!</h1>
        <p>Final Skor: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">YENİDEN OYNA 🚀</button>
    </div>

    <div id="joystick">
        <div id="joystick-knob"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.95, 1000);
            canvas.height = Math.min(window.innerHeight * 0.75, 700);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Oyun objeleri
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 50,
            height: 60,
            speed: 8,
            shootCooldown: 0,
            lives: 3
        };

        let bullets = [];
        let enemies = [];
        let particles = [];
        let score = 0;
        let level = 1;
        let gameRunning = true;
        let spawnRate = 0.02;
        let enemySpeed = 2;

        const keys = {};
        let joystickActive = false;
        let joystickData = { x: 0, y: 0 };

        // Kontroller
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                shoot();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Joystick (Mobil)
        const joystick = document.getElementById('joystick');
        const knob = document.getElementById('joystick-knob');
        
        joystick.addEventListener('touchstart', handleTouch);
        joystick.addEventListener('touchmove', handleTouch);
        joystick.addEventListener('touchend', resetJoystick);

        function handleTouch(e) {
            e.preventDefault();
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const touch = e.touches[0];
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 40;
            
            if (dist > maxDist) {
                dx = (dx/dist) * maxDist;
                dy = (dy/dist) * maxDist;
            }
            
            joystickData = { x: dx/maxDist, y: dy/maxDist };
            knob.style.transform = `translate(${dx-30}px, ${dy-30}px)`;
            
            if (e.type === 'touchstart') joystickActive = true;
        }

        function resetJoystick() {
            joystickActive = false;
            joystickData = { x: 0, y: 0 };
            knob.style.transform = 'translate(-50%, -50%)';
        }

        // Ateş etme
        function shoot() {
            if (player.shootCooldown > 0) return;
            bullets.push({
                x: player.x + player.width/2,
                y: player.y,
                width: 6,
                height: 20,
                speed: 12
            });
            player.shootCooldown = 8;
        }

        // Parçacık efekti
        function createParticles(x, y, color = '#ffaa00') {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    maxLife: 40,
                    color
                });
            }
        }

        // Düşman oluştur
        function spawnEnemy() {
            const types = [
                { color: '#ff4444', points: 10, size: 40, speed: enemySpeed * 1.2 },
                { color: '#44ff44', points: 20, size: 30, speed: enemySpeed * 1.5 },
                { color: '#4444ff', points: 30, size: 35, speed: enemySpeed * 1.1 }
            ];
            const type = types[Math.floor(Math.random() * types.length)];
            
            enemies.push({
                x: Math.random() * (canvas.width - type.size),
                y: -type.size,
                width: type.size,
                height: type.size,
                speed: type.speed,
                color: type.color,
                points: type.points,
                rotation: 0
            });
        }

        // Çarpışma kontrolü
        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.width &&
                   r1.x + r1.width > r2.x &&
                   r1.y < r2.y + r2.height &&
                   r1.y + r1.height > r2.y;
        }

        // UI güncelleme
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            const livesContainer = document.getElementById('lives');
            livesContainer.innerHTML = '';
            for (let i = 0; i < player.lives; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                livesContainer.appendChild(heart);
            }
        }

        // Level up animasyonu
        function showLevelUp() {
            document.getElementById('levelUp').style.display = 'block';
            setTimeout(() => {
                document.getElementById('levelUp').style.display = 'none';
            }, 2000);
        }

        // Oyun döngüsü
        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Yıldızlar arka plan
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            for (let i = 0; i < 100; i++) {
                const x = (i * 123.456) % canvas.width;
                const y = (Math.sin(Date.now() * 0.001 + i) * 50 + 50) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Oyuncu hareketi
            let moveX = 0;
            if (keys['ArrowLeft'] || keys['KeyA']) moveX = -player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) moveX = player.speed;
            if (joystickActive) moveX += joystickData.x * player.speed;

            player.x += moveX;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // Otomatik ateş (space basılı tut)
            if (keys['Space']) shoot();

            // Mermi cooldown
            if (player.shootCooldown > 0) player.shootCooldown--;

            // Mermiler
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                if (bullet.y < -bullet.height) return false;

                ctx.save();
                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 15;
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
                ctx.restore();

                return true;
            });

            // Oyuncu çizimi
            ctx.save();
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // Alev efekti
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2 - 8, player.y + player.height);
            ctx.lineTo(player.x + player.width/2, player.y + player.height + 20);
            ctx.lineTo(player.x + player.width/2 + 8, player.y + player.height);
            ctx.fill();
            ctx.restore();

            // Düşmanlar
            if (Math.random() < spawnRate) spawnEnemy();

            enemies.forEach((enemy, i) => {
                enemy.y += enemy.speed;
                enemy.rotation += 0.1;

                // Düşman çizimi
                ctx.save();
                ctx.translate(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                ctx.rotate(enemy.rotation);
                ctx.fillStyle = enemy.color;
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 10;
                
                // Düşman şekli
                ctx.beginPath();
                ctx.arc(0, 0, enemy.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Detaylar
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-10, -10, 4, 0, Math.PI * 2);
                ctx.arc(10, -10, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (enemy.y > canvas.height) {
                    enemies.splice(i, 1);
                    player.lives--;
                    createParticles(canvas.width/2, canvas.height, '#ff4444');
                }
            });

            // Çarpışmalar
            bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    if (checkCollision(bullet, enemy)) {
                        score += enemy.points;
                        createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color);
                        bullets.splice(bi, 1);
                        enemies.splice(ei, 1);
                    }
                });
            });

            // Oyuncu-düşman çarpışması
            enemies.forEach((enemy, i) => {
                if (checkCollision(player, enemy)) {
                    player.lives--;
                    createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#ff4444');
                    enemies.splice(i, 1);
                }
            });

            // Parçacıklar
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += 0.2;
                const alpha = p.life / p.maxLife;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, alpha * 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                return p.life > 0;
            });

            // Level sistemi
            const newLevel = Math.floor(score / 1000) + 1;
            if (newLevel > level) {
                level = newLevel;
                spawnRate = Math.min(0.05, spawnRate * 1.2);
                enemySpeed *= 1.1;
                showLevelUp();
            }

            // Oyun sonu
            if (player.lives <= 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').style.display = 'block';
            }

            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // Yeniden başlat
        function restartGame() {
            player.x = canvas.width / 2;
            player.lives = 3;
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            level = 1;
            spawnRate = 0.02;
            enemySpeed = 2;
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
            gameLoop();
        }

        // Oyunu başlat
        updateUI();
        setInterval(shoot, 100); // Auto-fire için
        gameLoop();
    </script>
</body>
</html>
