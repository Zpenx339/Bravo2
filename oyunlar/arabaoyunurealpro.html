<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 Highway Racer - Akıllı Spawn</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Arial Black', Arial, sans-serif;
            overflow: hidden; touch-action: manipulation;
        }
        #gameContainer {
            position: relative; box-shadow: 0 0 40px rgba(0, 255, 100, 0.5);
            border-radius: 12px; overflow: hidden;
        }
        canvas { display: block; background: #111; }
        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            color: #fff; padding: 12px 20px; display: flex;
            justify-content: space-between; font-size: 26px;
            text-shadow: 2px 2px 6px #000; pointer-events: none; z-index: 10;
        }
        #gameOver {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92); padding: 35px 55px; border-radius: 18px;
            text-align: center; color: white; display: none; pointer-events: all;
            border: 4px solid #00ff88;
        }
        button {
            margin-top: 20px; padding: 14px 40px; font-size: 24px;
            background: #00ff88; color: #000; border: none;
            border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="canvas" width="800" height="620"></canvas>
   
    <div id="ui">
        <div>Skor: <span id="score">0</span></div>
        <div>En Yüksek: <span id="highScore">0</span></div>
    </div>
    <div id="gameOver">
        <h1>🚗 OYUN BİTTİ</h1>
        <p id="finalScore">Skor: 0</p>
        <button onclick="restartGame()">Tekrar Oyna</button>
    </div>
</div>

<script>
// ====================== DEĞİŞKENLER ======================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const gameOverScreen = document.getElementById('gameOver');
const finalScoreEl = document.getElementById('finalScore');

let gameRunning = false;
let score = 0;
let highScore = localStorage.getItem('highwayHighScore') || 0;
highScoreEl.textContent = Math.floor(highScore);

const player = { x: 370, y: 460, width: 68, height: 130, speed: 9 };

let roadY = 0;
let obstacles = [];
let speed = 7;
let lastSpawnTime = 0;
let keys = {};
let touchStartX = 0;

const lanes = [195, 365, 535]; // Sol - Orta - Sağ

// ====================== ÇİZİM ======================
function drawRoad() {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#0a3a0a';
    ctx.fillRect(0, 0, 140, canvas.height);
    ctx.fillRect(canvas.width - 140, 0, 140, canvas.height);

    ctx.fillStyle = '#555';
    ctx.fillRect(120, 0, 25, canvas.height);
    ctx.fillRect(canvas.width - 145, 0, 25, canvas.height);

    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 9;
    ctx.setLineDash([55, 85]);
    for (let i = -2; i < 9; i++) {
        let y = (roadY + i * 145) % (canvas.height + 300) - 150;
        ctx.beginPath(); ctx.moveTo(280, y); ctx.lineTo(280, y + 120); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(520, y); ctx.lineTo(520, y + 120); ctx.stroke();
    }
    ctx.setLineDash([]);
}

function drawCar(x, y, color = '#00ff88', isPlayer = false) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x + 8, y + 28, player.width - 16, player.height - 40);

    ctx.fillStyle = color;
    ctx.fillRect(x, y + 15, player.width, player.height - 35);

    ctx.fillStyle = isPlayer ? '#00aaff' : '#cc0000';
    ctx.fillRect(x + 12, y + 38, player.width - 24, 48);

    ctx.fillStyle = '#ffff00';
    ctx.fillRect(x + 8, y + 22, 14, 16);
    ctx.fillRect(x + player.width - 22, y + 22, 14, 16);

    ctx.fillStyle = '#ff0000';
    ctx.fillRect(x + 10, y + player.height - 32, 16, 14);
    ctx.fillRect(x + player.width - 26, y + player.height - 32, 16, 14);
}

// ====================== AKILLI SPAWN SİSTEMİ ======================
function spawnObstacles() {
    const now = Date.now();
    if (now - lastSpawnTime < 700 - speed * 25) return; // Hız arttıkça daha sık spawn

    // Kaç tane araba çıkacağını belirle (1 veya 2, nadiren 3)
    let count = 1;
    if (Math.random() < 0.45) count = 2;
    if (Math.random() < 0.08) count = 3;

    // Rastgele şerit kombinasyonları (daha doğal)
    let selectedLanes = [];

    if (count === 1) {
        selectedLanes = [Math.floor(Math.random() * 3)];
    } 
    else if (count === 2) {
        // En çok istediğin kombinasyonlar: sol+sağ, sol+orta, orta+sağ
        const combinations = [[0,2], [0,1], [1,2]];
        selectedLanes = combinations[Math.floor(Math.random() * combinations.length)];
    } 
    else {
        selectedLanes = [0,1,2];
    }

    selectedLanes.forEach(laneIndex => {
        // Aynı şeritte çok yakın araba çıkmasın
        const existingInLane = obstacles.filter(o => o.lane === laneIndex);
        if (existingInLane.length > 0) {
            const lastInLane = existingInLane[existingInLane.length-1];
            if (lastInLane.y < 180) return; // Çok yakınsa spawn etme
        }

        obstacles.push({
            x: lanes[laneIndex],
            y: -150 - Math.random() * 80,
            width: 68,
            height: 130,
            lane: laneIndex
        });
    });

    lastSpawnTime = now;
}

// ====================== OYUN DÖNGÜSÜ ======================
function update() {
    if (!gameRunning) return;

    roadY += speed * 1.8;
    score += 2;
    scoreEl.textContent = Math.floor(score / 4);

    if (score % 450 === 0) speed = Math.min(speed + 0.45, 15);

    // Oyuncu hareket
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    player.x = Math.max(150, Math.min(canvas.width - player.width - 150, player.x));

    // Engelleri güncelle
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += speed;

        if (
            player.x < obstacles[i].x + obstacles[i].width &&
            player.x + player.width > obstacles[i].x &&
            player.y < obstacles[i].y + obstacles[i].height &&
            player.y + player.height > obstacles[i].y
        ) {
            gameOver();
            return;
        }

        if (obstacles[i].y > canvas.height + 100) obstacles.splice(i, 1);
    }

    spawnObstacles();
}

function draw() {
    drawRoad();
    obstacles.forEach(obs => drawCar(obs.x, obs.y, '#ff4444'));
    drawCar(player.x, player.y, '#00ff88', true);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ====================== KONTROLLER ======================
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('touchstart', e => { if(gameRunning) touchStartX = e.touches[0].clientX; });
canvas.addEventListener('touchmove', e => {
    if (!gameRunning) return;
    const diff = e.touches[0].clientX - touchStartX;
    player.x += diff * 1.7;
    touchStartX = e.touches[0].clientX;
});

// ====================== OYUN FONKSİYONLARI ======================
function startGame() {
    gameRunning = true;
    score = 0;
    speed = 7;
    obstacles = [];
    player.x = 370;
    lastSpawnTime = 0;
    scoreEl.textContent = '0';
    gameOverScreen.style.display = 'none';
}

function gameOver() {
    gameRunning = false;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('highwayHighScore', highScore);
        highScoreEl.textContent = Math.floor(highScore);
    }
    finalScoreEl.textContent = `Skor: ${Math.floor(score / 4)}`;
    gameOverScreen.style.display = 'block';
}

function restartGame() {
    startGame();
}

function init() {
    highScoreEl.textContent = Math.floor(highScore);
    startGame();
    gameLoop();
}

init();
</script>
</body>
</html>
